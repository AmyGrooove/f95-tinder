<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F95 Tinder</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(1200px 600px at 50% -20%, #18213a 0%, transparent 60%),
          radial-gradient(900px 500px at 20% 0%, #1a1440 0%, transparent 55%),
          #0b0f16;
        color: #e9edf5;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        overflow: hidden;
      }

      .bootSplash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          radial-gradient(880px 520px at 50% -8%, rgba(79, 132, 255, 0.24), transparent 62%),
          radial-gradient(640px 420px at 12% 0%, rgba(52, 92, 196, 0.24), transparent 60%),
          linear-gradient(180deg, rgba(6, 10, 16, 0.76), rgba(6, 10, 16, 0.94));
        backdrop-filter: blur(18px);
        transition: opacity 180ms ease-out;
      }

      .bootSplashHidden {
        opacity: 0;
        pointer-events: none;
      }

      .bootSplashPanel {
        width: min(520px, 100%);
        display: grid;
        gap: 16px;
        padding: 22px 24px;
        border-radius: 24px;
        border: 1px solid rgba(34, 48, 74, 0.9);
        background:
          linear-gradient(180deg, rgba(20, 30, 48, 0.92), rgba(9, 14, 22, 0.98)),
          rgba(9, 14, 22, 0.94);
        box-shadow:
          0 34px 80px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }

      .bootSplashEyebrow {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(146, 191, 255, 0.92);
      }

      .bootSplashHero {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
      }

      .bootSplashPulse {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0) 42%),
          linear-gradient(145deg, rgba(96, 145, 255, 1), rgba(45, 87, 184, 0.92));
        box-shadow:
          0 0 0 1px rgba(176, 206, 255, 0.14),
          0 16px 30px rgba(27, 69, 160, 0.35);
        animation: bootSplashPulse 1.2s ease-in-out infinite;
      }

      .bootSplashHeroCopy {
        display: grid;
        gap: 4px;
      }

      .bootSplashTitle {
        font-size: clamp(28px, 4vw, 40px);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 0.95;
      }

      .bootSplashSubtitle {
        color: rgba(225, 234, 255, 0.92);
        font-size: 15px;
        font-weight: 600;
      }

      .bootSplashText {
        color: rgba(233, 237, 245, 0.72);
        line-height: 1.55;
      }

      .bootSplashTrack {
        position: relative;
        overflow: hidden;
        height: 10px;
        border-radius: 999px;
        border: 1px solid rgba(54, 78, 120, 0.76);
        background:
          linear-gradient(180deg, rgba(19, 28, 43, 0.98), rgba(8, 12, 20, 1)),
          rgba(8, 12, 20, 0.96);
      }

      .bootSplashFill {
        width: 36%;
        height: 100%;
        border-radius: inherit;
        background:
          linear-gradient(90deg, rgba(88, 137, 255, 0.94), rgba(169, 205, 255, 0.98));
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.12),
          0 0 24px rgba(79, 132, 255, 0.28);
        animation: bootSplashIndeterminate 1.1s ease-in-out infinite;
      }

      .bootSplashMetaRow {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        font-size: 12px;
        color: rgba(212, 224, 255, 0.72);
      }

      @keyframes bootSplashPulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.06);
        }
      }

      @keyframes bootSplashIndeterminate {
        0% {
          transform: translateX(-120%);
        }

        50% {
          transform: translateX(120%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" class="bootSplash" aria-live="polite" aria-busy="true">
      <div class="bootSplashPanel">
        <div class="bootSplashEyebrow">Startup Sync</div>
        <div class="bootSplashHero">
          <div class="bootSplashPulse" aria-hidden="true"></div>
          <div class="bootSplashHeroCopy">
            <div class="bootSplashTitle">F95 Tinder</div>
            <div class="bootSplashSubtitle">Запускаю интерфейс и локальные данные</div>
          </div>
        </div>
        <div class="bootSplashText">
          Поднимаю renderer, bridge Electron и стартовый каталог перед показом
          основного окна.
        </div>
        <div class="bootSplashTrack">
          <div class="bootSplashFill"></div>
        </div>
        <div class="bootSplashMetaRow">
          <span>Подготовка...</span>
          <span>Electron only</span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideBootSplash = () => {
        const splashElement = document.getElementById('boot-splash')
        if (!splashElement || splashElement.dataset.hidden === 'true') {
          return
        }

        splashElement.dataset.hidden = 'true'
        splashElement.classList.add('bootSplashHidden')
        window.setTimeout(() => {
          splashElement.remove()
        }, 220)
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
